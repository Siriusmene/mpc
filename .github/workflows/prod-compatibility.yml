name: Production Compatibility

on:
  workflow_dispatch:
  # Temporarily disabled until finalized
  # push:
  #   branches:
  #     - develop
  #   paths:
  #     - chain-signatures/**
  # pull_request:

env:
  RUSTFLAGS: -D warnings

jobs:
  compat:
    name: Build tagged binaries and run compat tests
    runs-on: warp-ubuntu-latest-x64-4x

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Redis image
        run: docker pull redis:7.4.2

      - name: Install Rust (1.81.0)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
          target: wasm32-unknown-unknown

      - uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: "${{ runner.os }}-cargo-${{ hashFiles('chain-signatures/Cargo.lock') }}"
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build governance contract
        run: ./build-contract.sh

      - name: Build node with stable toolchain
        run: cargo build-node

      - name: Build compatibility binaries from tags
        run: ./scripts/build-compat-binaries.sh

      - name: Build integration tests
        run: cargo build -p integration-tests --tests

      - name: Run production compatibility tests
        run: ./scripts/test-prod-compat.sh
        env:
          RUST_LOG: info,workspaces=warn
          RUST_BACKTRACE: 1
