name: Canton Integration Tests

on:
  push:
    branches:
      - develop
    paths:
      - integration-tests/**
      - chain-signatures/**
  pull_request:
  merge_group:

env:
  RUSTFLAGS: -D warnings

jobs:
  canton-tests:
    name: Canton Stream Tests
    runs-on: warp-ubuntu-latest-x64-4x

    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Redis
        run: docker pull redis:7.4.2

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dpm (Canton CLI)
        run: |
          curl -fsSL https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> $GITHUB_PATH
          export PATH="$HOME/.dpm/bin:$PATH"
          dpm --version

      - name: Install Rust (1.81.0)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
          target: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: chain-signatures/contract-eth/package-lock.json

      # Install system OpenSSL explicitly here so the build uses system OpenSSL instead of building OpenSSL from source
      - name: Install system OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Set OpenSSL to system
        run: echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: canton-test
          cache-targets: true
          cache-on-failure: false
          # Prevent every PR from uploading multi-GB caches
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      - name: Build eth contract
        working-directory: ./chain-signatures/contract-eth
        run: npm ci && npx hardhat compile

      - name: Presetup binaries
        run: ./setup.sh

      - name: Build integration tests
        run: cargo build -p integration-tests --tests

      - name: Run Canton stream tests
        run: cargo test -p integration-tests --test lib -- canton_stream --ignored --nocapture --test-threads 1
        env:
          RUST_LOG: info,workspaces=warn
          RUST_BACKTRACE: 1

  canton-e2e:
    name: Canton E2E Tests
    runs-on: warp-ubuntu-latest-x64-4x

    steps:
      - uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Redis
        run: docker pull redis:7.4.2

      - name: Install Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dpm (Canton CLI)
        run: |
          curl -fsSL https://get.digitalasset.com/install/install.sh | sh
          echo "$HOME/.dpm/bin" >> $GITHUB_PATH
          export PATH="$HOME/.dpm/bin:$PATH"
          dpm --version

      - name: Install Rust (1.81.0)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
          target: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: chain-signatures/contract-eth/package-lock.json

      # Install system OpenSSL explicitly here so the build uses system OpenSSL instead of building OpenSSL from source
      - name: Install system OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Set OpenSSL to system
        run: echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: canton-e2e-test
          cache-targets: true
          cache-on-failure: false
          # Prevent every PR from uploading multi-GB caches
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      - name: Build eth contract
        working-directory: ./chain-signatures/contract-eth
        run: npm ci && npx hardhat compile

      - name: Presetup binaries
        run: ./setup.sh

      - name: Build integration tests
        run: cargo build -p integration-tests --tests

      - name: Run Canton E2E tests
        run: cargo test -p integration-tests --test lib -- cases::canton --ignored --nocapture --test-threads 1
        env:
          RUST_LOG: info,workspaces=warn
          RUST_BACKTRACE: 1
