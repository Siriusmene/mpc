name: Nightly Tests

# The right schedule
on:
  schedule:
    - cron: "0 3 * * *" # Run once per day at 3:00 am

jobs:
  # Check the date and see if latest commit is within a day.
  commited_recently:
    runs-on: ubuntu-20.04
    name: Check latest commit
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
      - name: print latest_commit
        run: echo ${{ github.sha }}
      - id: should_run
        continue-on-error: true
        name: Check if the latest commit is within a day
        if: ${{ github.event_name == 'schedule' }}
        run: test -z $(git rev-list  --after="24 hours"  ${{ github.sha }}) && echo "should_run=false" >> "$GITHUB_OUTPUT"

  nightly:
    strategy:
      matrix:
        # FIXME: macos-latest-xl is disabled since colima is erroring out right now
        os: [warp-ubuntu-latest-x64-4x]

    needs: commited_recently
    if: ${{ needs.commited_recently.outputs.should_run != 'false' }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Docker
        if: ${{ matrix.os == 'macos-latest-xl' }}
        run: |
          brew install docker
          colima start
          # Colima does not expose the Docker socket by default, we have to symlink it
          # https://github.com/abiosoft/colima/blob/main/docs/FAQ.md#cannot-connect-to-the-docker-daemon-at-unixvarrundockersock-is-the-docker-daemon-running
          sudo ln -sf $HOME/.colima/default/docker.sock /var/run/docker.sock
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Relayer & Sandbox Docker Images
        run: |
          docker pull redis:7.4.2

      - name: Setup Solana and Anchor
        uses: metadaoproject/setup-anchor@v3.1
        with:
          solana-cli-version: '2.3.9'
          anchor-version: '0.30.1'

      - name: Install Rust (1.81.0)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
          target: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: chain-signatures/contract-eth/package-lock.json

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-test
          cache-targets: true
          cache-on-failure: false
          # Prevent every PR from uploading multi-GB caches
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      # Install system OpenSSL explicitly here so the build uses system OpenSSL instead of building OpenSSL from source
      - name: Install system OpenSSL
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Set OpenSSL to system
        run: echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV

      - name: Build eth contract
        working-directory: ./chain-signatures/contract-eth
        run: npm ci && npx hardhat compile

      - name: Presetup binaries
        run: ./setup.sh
        env:
          MPC_ENABLE_HELIOS: 1

      - name: Build nightly
        run: cargo build -p integration-tests --tests --features helios

      - name: Run nightly
        run: cargo test -p integration-tests --features helios --test lib -- cases::nightly --show-output --ignored
        env:
          RUST_LOG: info,workspaces=warn
          RUST_BACKTRACE: 1
