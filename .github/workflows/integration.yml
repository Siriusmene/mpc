name: Integration

on:
  push:
    branches:
      - develop
    paths:
      - integration-tests/**
      - chain-signatures/**
  pull_request:

env:
  RUSTFLAGS: -D warnings
jobs:
  # Light-weight component tests using the MPC fixture, these can run in parallel.
  component-test:
    name: Component Test
    runs-on: warp-ubuntu-latest-x64-4x

    steps:
      - name: Comment on PR if this is a re-run
        if: github.run_attempt > 1 && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `⚠️ Component tests (MPC fixture) were re-run (attempt ${process.env.RUN_ATTEMPT})`,
            });

      - uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Relayer, Sandbox, Redis Docker Images
        run: |
          docker pull redis:7.4.2

      - name: Install Rust (1.81.0)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
          target: wasm32-unknown-unknown

      - uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: "${{ runner.os }}-cargo-${{ hashFiles('chain-signatures/Cargo.lock') }}"
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      # Build the tests before actually running them to see how long the tests take to run by itself
      # instead of including the build time in the test time report on Github.
      - name: Build Chain-Signatures Integration Tests
        run: cargo build -p integration-tests --tests

      - name: Test
        run: cargo nextest run -p integration-tests --profile fixture
        env:
          RUST_LOG: info,workspaces=warn
          RUST_BACKTRACE: 1

  # Integration tests that share the mpc_it_network Docker network and thus must run sequentially.
  # This also requires additional Solana/Anchor setup.
  sequential-integration-test:
    name: Integration Test
    strategy:
      matrix:
        # FIXME: macos-latest-xl is disabled since colima is erroring out right now
        os: [warp-ubuntu-latest-x64-4x]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Comment on PR if this is a re-run
        if: github.run_attempt > 1 && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `⚠️ Integration tests were re-run (attempt ${process.env.RUN_ATTEMPT})`,
            });

      - uses: actions/checkout@v3

      - name: Install Docker
        if: ${{ matrix.os == 'macos-latest-xl' }}
        run: |
          brew install docker
          colima start
          # Colima does not expose the Docker socket by default, we have to symlink it
          # https://github.com/abiosoft/colima/blob/main/docs/FAQ.md#cannot-connect-to-the-docker-daemon-at-unixvarrundockersock-is-the-docker-daemon-running
          sudo ln -sf $HOME/.colima/default/docker.sock /var/run/docker.sock

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Relayer, Sandbox, Redis Docker Images
        run: |
          docker pull redis:7.4.2

      - name: Install Rust (1.81.0)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
          target: wasm32-unknown-unknown

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Solana and Anchor
        uses: metadaoproject/setup-anchor@v3.1
        with:
          solana-cli-version: '2.3.9'
          anchor-version: '0.30.1'

      - uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: "${{ runner.os }}-cargo-${{ hashFiles('chain-signatures/Cargo.lock') }}"
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Chain-Signatures Contract
        run: ./build-contract.sh

      - name: Build eth contract
        working-directory: ./chain-signatures/contract-eth
        run: npm i && npx hardhat compile

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      # Build the tests before actually running them to see how long the tests take to run by itself
      # instead of including the build time in the test time report on Github.
      - name: Build Chain-Signatures Integration Tests
        run: cargo build -p integration-tests --tests

      - name: Test
        run: cargo nextest run -p integration-tests --profile cluster
        env:
          RUST_LOG: info,workspaces=warn
          RUST_BACKTRACE: 1
          IT_ETH_ACCOUNT_SK: ${{ secrets.IT_ETH_ACCOUNT_SK }}
          IT_ETH_CONTRACT_ADDR: ${{ secrets.IT_ETH_CONTRACT_ADDR }}
          IT_ETH_CONSENSUS_RPC_URL: ${{ secrets.IT_ETH_CONSENSUS_RPC_URL }}
          IT_ETH_EXECUTION_RPC_URL: ${{ secrets.IT_ETH_EXECUTION_RPC_URL }}
