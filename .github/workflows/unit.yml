name: Unit
on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/unit.yml"
      - "chain-signatures/**/*.rs"
      - "chain-signatures/Cargo.*"
      - "integration-tests/**/*.rs"
      - "chain-signatures/contract-eth/**/*.sol"
      - "chain-signatures/contract-eth/**/*.js"
  pull_request:

env:
  RUSTFLAGS: -D warnings
jobs:
  test:
    runs-on: warp-ubuntu-latest-x64-4x
    name: Check & Test
    steps:
      - uses: actions/checkout@v3
      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
      - name: Install Rust (1.81.0)
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
          target: wasm32-unknown-unknown
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - uses: WarpBuilds/cache@v1
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: "${{ runner.os }}-cargo-${{ hashFiles('mpc-recovery/Cargo.lock') }}"
          restore-keys: ${{ runner.os }}-cargo-
      - name: Compile Contract
        run: ./build-contract.sh
      - name: Compile eth contract
        run: cd chain-signatures/contract-eth && npm i && npx hardhat compile
      - name: Eth contract unit tests
        run: cd chain-signatures/contract-eth && npx hardhat test
      - name: Test format
        run: cargo fmt -- --check
      - name: Test clippy
        run: cargo clippy --tests -- -Dclippy::all
      - name: Unit tests
        run: cargo test --workspace --exclude integration-tests

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.81.0
      - name: Install Audit
        run: cargo install cargo-audit
      - name: Run Audit
        # even if previous audit step fails, run this audit step to ensure all crates are audited
        if: always()
        # audit exceptions can be found in .cargo/audit.toml
        run: |
          cargo audit
